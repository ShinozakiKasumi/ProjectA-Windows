name: Release Windows Installer

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      source_sha:
        description: ProjectA source commit that requested this build.
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: windows-prerelease-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve ProjectA source commit
        id: source
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECTA_SOURCE_TOKEN }}
          INPUT_SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          if [ -n "$INPUT_SOURCE_SHA" ]; then
            SOURCE_SHA="$INPUT_SOURCE_SHA"
          elif [ -n "$GH_TOKEN" ]; then
            SOURCE_SHA="$(gh api repos/ShinozakiKasumi/ProjectA/commits/main --jq .sha)"
          elif [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            echo "::error::PROJECTA_SOURCE_TOKEN is required for scheduled ProjectA sync builds."
            exit 1
          else
            SOURCE_SHA="$GITHUB_SHA"
          fi

          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved ProjectA source commit: $SOURCE_SHA"

      - name: Check existing prerelease
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: |
          RELEASE_TAG="prerelease-${SOURCE_SHA}"
          if [ "$GITHUB_EVENT_NAME" = "schedule" ] && gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Prerelease $RELEASE_TAG already exists; skipping scheduled build."
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.release.outputs.should_build == 'true'
        run: npm ci

      - name: Build Windows bundle
        if: steps.release.outputs.should_build == 'true'
        run: npm run build

      - name: Collect installers
        if: steps.release.outputs.should_build == 'true'
        shell: bash
        run: |
          mkdir -p dist
          find target/release/bundle -type f \( -name '*.exe' -o -name '*.msi' \) -print -exec cp {} dist/ \;
          if [ -z "$(find dist -type f -print -quit)" ]; then
            echo "::error::No Windows installer artifact was produced."
            exit 1
          fi
          ls -lh dist

      - name: Publish prerelease
        if: steps.release.outputs.should_build == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: |
          RELEASE_TAG="prerelease-${SOURCE_SHA}"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release delete "$RELEASE_TAG" --yes --cleanup-tag
          fi

          gh release create "$RELEASE_TAG" dist/* \
            --prerelease \
            --title "Windows prerelease ${SOURCE_SHA::12}" \
            --notes "Automated Windows installer prerelease for ProjectA source commit ${SOURCE_SHA}. Client shell commit: ${GITHUB_SHA}."
