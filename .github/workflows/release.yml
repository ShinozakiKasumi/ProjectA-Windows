name: Release Desktop App

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      source_sha:
        description: ProjectA source commit that requested this build.
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: desktop-prerelease-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      source_sha: ${{ steps.source.outputs.source_sha }}
      should_build: ${{ steps.release.outputs.should_build }}
    steps:
      - name: Resolve ProjectA source commit
        id: source
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PROJECTA_SOURCE_TOKEN }}
          INPUT_SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          if [ -n "$INPUT_SOURCE_SHA" ]; then
            SOURCE_SHA="$INPUT_SOURCE_SHA"
          elif [ -n "$GH_TOKEN" ]; then
            SOURCE_SHA="$(gh api repos/ShinozakiKasumi/ProjectA/commits/main --jq .sha)"
          elif [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            echo "::error::PROJECTA_SOURCE_TOKEN is required for scheduled ProjectA sync builds."
            exit 1
          else
            SOURCE_SHA="$GITHUB_SHA"
          fi
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved ProjectA source commit: $SOURCE_SHA"

      - name: Check existing prerelease
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.source.outputs.source_sha }}
        run: |
          RELEASE_TAG="prerelease-${SOURCE_SHA}"
          if [ "$GITHUB_EVENT_NAME" = "schedule" ] && gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Prerelease $RELEASE_TAG already exists; skipping scheduled build."
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve
    if: needs.resolve.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: windows
          - platform: ubuntu-22.04
            target: linux
          - platform: macos-latest
            target: macos
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop bundle
        run: npm run build

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          find target/release/bundle -type f \( -name '*.exe' -o -name '*.AppImage' -o -name '*.dmg' \) -print -exec cp {} dist/ \;
          if [ -z "$(find dist -type f -print -quit)" ]; then
            echo "::error::No installer artifact was produced."
            exit 1
          fi
          ls -lh dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/
          retention-days: 1

  publish:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List collected artifacts
        run: find dist -type f | sort

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ needs.resolve.outputs.source_sha }}
        run: |
          RELEASE_TAG="prerelease-${SOURCE_SHA}"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release delete "$RELEASE_TAG" --yes --cleanup-tag
          fi

          gh release create "$RELEASE_TAG" dist/* \
            --prerelease \
            --title "Desktop prerelease ${SOURCE_SHA::12}" \
            --notes "Automated desktop prerelease for ProjectA source commit ${SOURCE_SHA}.

          **Platforms:** Windows (.exe), Linux (.AppImage), macOS (.dmg)

          Client shell commit: ${GITHUB_SHA}."
